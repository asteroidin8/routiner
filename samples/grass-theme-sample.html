<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zndi 잔디 테마 샘플</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #121212;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 40px 24px;
    max-width: 600px;
    margin: 0 auto;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 8px;
    color: #22C55E;
  }
  h2 {
    font-size: 18px;
    font-weight: 700;
    margin: 40px 0 16px;
    color: #e8e8e8;
  }
  h3 {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    margin-bottom: 12px;
  }
  .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 32px;
  }

  /* ── Color Packs ── */
  .color-section { display: flex; flex-direction: column; gap: 20px; }
  .color-pack {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    border-radius: 16px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .color-pack:hover { border-color: #444; }
  .color-pack.active { border-color: #22C55E; }
  .pack-name {
    font-size: 14px;
    font-weight: 700;
    min-width: 56px;
  }
  .pack-cells {
    display: flex;
    gap: 6px;
    flex: 1;
  }
  .pack-cell {
    width: 36px;
    height: 36px;
    border-radius: 8px;
  }
  .pack-cell.empty {
    border: 1px solid #333;
    background: #1e1e1e;
  }
  .level-labels {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .level-label {
    width: 36px;
    text-align: center;
    font-size: 9px;
    color: #555;
  }
  .pack-price {
    font-size: 11px;
    color: #888;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 8px;
    background: #252525;
  }
  .pack-price.free {
    color: #22C55E;
    background: rgba(34, 197, 94, 0.1);
  }

  /* ── Weekly Grass Preview ── */
  .preview-section {
    margin-top: 24px;
    padding: 20px;
    border-radius: 16px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
  }
  .preview-title {
    font-size: 12px;
    color: #666;
    margin-bottom: 12px;
    text-align: center;
  }
  .week-row {
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .week-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .week-label {
    font-size: 10px;
    color: #555;
  }
  .week-cell {
    width: 38px;
    height: 38px;
    border-radius: 9px;
    transition: all 0.3s;
  }

  /* ── Cell Shapes ── */
  .shape-section { display: flex; flex-direction: column; gap: 24px; }
  .shape-card {
    padding: 20px;
    border-radius: 16px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
  }
  .shape-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .shape-name {
    font-size: 15px;
    font-weight: 700;
  }
  .shape-desc {
    font-size: 11px;
    color: #666;
  }
  .shape-grid {
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .shape-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* Shape: default */
  .cell-default {
    width: 40px; height: 40px;
    border-radius: 10px;
  }
  /* Shape: pixel */
  .cell-pixel {
    width: 40px; height: 40px;
    border-radius: 2px;
  }
  /* Shape: circle */
  .cell-circle {
    width: 40px; height: 40px;
    border-radius: 50%;
  }
  /* Shape: diamond */
  .cell-diamond {
    width: 32px; height: 32px;
    border-radius: 6px;
    transform: rotate(45deg);
    margin: 4px;
  }

  .cell-empty {
    border: 1px solid #333;
    background: #1e1e1e;
  }

  /* ── Animations ── */
  @keyframes neonGlow {
    0%, 100% { box-shadow: 0 0 4px var(--glow-color), 0 0 12px var(--glow-color); }
    50% { box-shadow: 0 0 8px var(--glow-color), 0 0 24px var(--glow-color), 0 0 36px var(--glow-color); }
  }
  @keyframes pixelBlink {
    0%, 100% { opacity: 1; }
    25% { opacity: 0.4; }
    50% { opacity: 1; }
    75% { opacity: 0.6; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }
  @keyframes diamondSparkle {
    0%, 100% { transform: rotate(45deg) scale(1); filter: brightness(1); }
    50% { transform: rotate(45deg) scale(1.08); filter: brightness(1.4); }
  }

  .anim-glow {
    --glow-color: rgba(34, 197, 94, 0.5);
    animation: neonGlow 2s ease-in-out infinite;
  }
  .anim-pixel {
    animation: pixelBlink 1.2s steps(4) infinite;
  }
  .anim-pulse {
    animation: pulse 1.8s ease-in-out infinite;
  }
  .anim-sparkle {
    animation: diamondSparkle 2s ease-in-out infinite;
  }

  /* ── Monthly Grid Preview ── */
  .month-preview {
    margin-top: 24px;
    padding: 20px;
    border-radius: 16px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
  }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    justify-items: center;
  }
  .month-cell {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #666;
    position: relative;
  }
  .month-cell.filled::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    z-index: 0;
  }
  .month-cell span { z-index: 1; position: relative; }
  .month-day-header {
    font-size: 10px;
    color: #444;
    text-align: center;
    padding: 4px 0;
  }

  /* ── Combo Preview ── */
  .combo-section {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  .combo-card {
    padding: 16px;
    border-radius: 14px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    text-align: center;
  }
  .combo-label {
    font-size: 11px;
    color: #888;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .combo-grid {
    display: flex;
    justify-content: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    margin-top: 8px;
  }
  .tag-pro {
    background: rgba(34,197,94,0.15);
    color: #22C55E;
  }
  .tag-shop {
    background: rgba(234,179,8,0.15);
    color: #EAB308;
  }

  .divider {
    height: 1px;
    background: #2a2a2a;
    margin: 32px 0;
  }
</style>
</head>
<body>

<h1>zndi</h1>
<p class="subtitle">잔디 테마 & 스킨 샘플</p>

<!-- ════════ COLOR PACKS ════════ -->
<h2>🎨 잔디 컬러 팩</h2>
<h3>셀 클릭하면 주간 미리보기가 바뀌어요</h3>

<div class="color-section" id="colorPacks"></div>

<div class="preview-section" id="weekPreview">
  <div class="preview-title">주간 잔디 미리보기</div>
  <div class="week-row" id="weekRow"></div>
</div>

<div class="divider"></div>

<!-- ════════ CELL SHAPES ════════ -->
<h2>✨ 셀 스킨</h2>
<h3>셀 모양 + 완료 시 이펙트 (level 4 셀에 애니메이션 적용)</h3>

<div class="shape-section" id="shapeSection"></div>

<div class="divider"></div>

<!-- ════════ COMBO ════════ -->
<h2>🔀 컬러 × 스킨 조합 예시</h2>
<h3>컬러 팩과 셀 스킨은 동시 적용 가능</h3>

<div class="combo-section" id="comboSection"></div>

<script>
const COLORS = [
  { name: '기본',    hex: '#22C55E', price: '무료',    free: true },
  { name: '벚꽃',    hex: '#F472B6', price: '₩1,000', free: false },
  { name: '오션',    hex: '#38BDF8', price: '₩1,000', free: false },
  { name: '라벤더',  hex: '#A78BFA', price: '₩1,000', free: false },
  { name: '선셋',    hex: '#FB923C', price: '₩1,000', free: false },
  { name: '불꽃',    hex: '#EF4444', price: '₩1,500', free: false },
  { name: '골드',    hex: '#EAB308', price: '₩1,500', free: false },
];

const OPACITIES = [0, 0.2, 0.4, 0.65, 1.0];
const WEEK_LEVELS = [3, 4, 2, 0, 4, 1, 3];
const WEEK_DAYS = ['월','화','수','목','금','토','일'];

let activeColor = COLORS[0];

function renderColorPacks() {
  const container = document.getElementById('colorPacks');
  container.innerHTML = COLORS.map((c, i) => `
    <div class="color-pack ${i === 0 ? 'active' : ''}" data-idx="${i}" onclick="selectColor(${i})">
      <div class="pack-name" style="color: ${c.hex}">${c.name}</div>
      <div>
        <div class="pack-cells">
          ${OPACITIES.map((op, li) =>
            li === 0
              ? `<div class="pack-cell empty"></div>`
              : `<div class="pack-cell" style="background:${c.hex}; opacity:${op}"></div>`
          ).join('')}
        </div>
        <div class="level-labels">
          ${['Lv.0','Lv.1','Lv.2','Lv.3','Lv.4'].map(l => `<div class="level-label">${l}</div>`).join('')}
        </div>
      </div>
      <div class="pack-price ${c.free ? 'free' : ''}">${c.price}</div>
    </div>
  `).join('');
}

function selectColor(idx) {
  activeColor = COLORS[idx];
  document.querySelectorAll('.color-pack').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  renderWeekPreview();
}

function renderWeekPreview() {
  const row = document.getElementById('weekRow');
  row.innerHTML = WEEK_DAYS.map((day, i) => {
    const level = WEEK_LEVELS[i];
    const cellStyle = level === 0
      ? 'border: 1px solid #333; background: #1e1e1e;'
      : `background: ${activeColor.hex}; opacity: ${OPACITIES[level]};`;
    return `
      <div class="week-day">
        <div class="week-label">${day}</div>
        <div class="week-cell" style="${cellStyle} border-radius: 9px;"></div>
      </div>
    `;
  }).join('');
}

const SHAPES = [
  {
    name: '기본',
    desc: '완료 시 네온 글로우',
    class: 'cell-default',
    anim: 'anim-glow',
    price: '무료',
    free: true,
  },
  {
    name: '픽셀',
    desc: '완료 시 8bit 깜빡임',
    class: 'cell-pixel',
    anim: 'anim-pixel',
    price: '₩1,500',
    free: false,
  },
  {
    name: '서클',
    desc: '완료 시 펄스 애니메이션',
    class: 'cell-circle',
    anim: 'anim-pulse',
    price: '₩1,500',
    free: false,
  },
  {
    name: '다이아',
    desc: '완료 시 반짝임 효과',
    class: 'cell-diamond',
    anim: 'anim-sparkle',
    price: '₩1,500',
    free: false,
  },
];

function renderShapes() {
  const container = document.getElementById('shapeSection');
  container.innerHTML = SHAPES.map(s => `
    <div class="shape-card">
      <div class="shape-header">
        <div>
          <div class="shape-name">${s.name}</div>
          <div class="shape-desc">${s.desc}</div>
        </div>
        <div class="pack-price ${s.free ? 'free' : ''}">${s.price}</div>
      </div>
      <div class="shape-grid">
        ${OPACITIES.map((op, li) => {
          const isEmpty = li === 0;
          const isMax = li === 4;
          const baseStyle = isEmpty
            ? ''
            : `background: #22C55E; opacity: ${op};`;
          const cls = [
            s.class,
            isEmpty ? 'cell-empty' : '',
            isMax ? s.anim : '',
          ].filter(Boolean).join(' ');
          const glowVar = isMax ? `--glow-color: rgba(34,197,94,0.5);` : '';
          return `
            <div class="shape-col">
              <div class="level-label">Lv.${li}</div>
              <div class="${cls}" style="${baseStyle} ${glowVar}"></div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
}

const COMBOS = [
  { color: COLORS[1], shape: SHAPES[2], label: '벚꽃 × 서클' },
  { color: COLORS[2], shape: SHAPES[1], label: '오션 × 픽셀' },
  { color: COLORS[3], shape: SHAPES[3], label: '라벤더 × 다이아' },
  { color: COLORS[5], shape: SHAPES[0], label: '불꽃 × 기본' },
];

function renderCombos() {
  const container = document.getElementById('comboSection');
  container.innerHTML = COMBOS.map(combo => {
    const levels = [0, 2, 4, 3, 1, 4, 0, 3, 2];
    return `
      <div class="combo-card">
        <div class="combo-label">${combo.label}</div>
        <div class="combo-grid">
          ${levels.map(li => {
            const isEmpty = li === 0;
            const isMax = li === 4;
            const baseStyle = isEmpty
              ? ''
              : `background: ${combo.color.hex}; opacity: ${OPACITIES[li]};`;
            const cls = [
              combo.shape.class,
              isEmpty ? 'cell-empty' : '',
              isMax ? combo.shape.anim : '',
            ].filter(Boolean).join(' ');
            const size = combo.shape.class === 'cell-diamond'
              ? 'width:22px;height:22px;margin:3px;'
              : 'width:28px;height:28px;';
            const glowVar = isMax ? `--glow-color: ${combo.color.hex}80;` : '';
            return `<div class="${cls}" style="${baseStyle} ${size} ${glowVar}"></div>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

renderColorPacks();
renderWeekPreview();
renderShapes();
renderCombos();
</script>

</body>
</html>
